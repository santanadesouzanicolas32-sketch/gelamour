<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelamour — Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --rosa:#E8528A;--rosa2:#C23A6E;--gold:#D4AF37;
      --marrom:#4A2C17;--bg:#0d0d12;--card:#16161f;
      --card2:#1e1e2a;--border:#2a2a38;
      --text:#eeeef5;--muted:#7777900;--muted:#777090;
      --green:#22c55e;--yellow:#f59e0b;--blue:#3b82f6;--red:#ef4444;--purple:#a855f7;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* NAV */
    nav{
      background:var(--card);border-bottom:1px solid var(--border);
      padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:50;
    }
    .brand{font-weight:700;font-size:15px;color:var(--gold);display:flex;align-items:center;gap:8px}
    #sync{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
    #sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* LAYOUT */
    .page{padding:20px 24px;max-width:1360px;margin:0 auto}

    /* AVISO */
    #aviso{
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
      color:#fca5a5;padding:10px 16px;border-radius:10px;font-size:13px;
      margin-bottom:16px;display:none;
    }

    /* KPI */
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .kpi{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:16px 18px;border-top:2px solid var(--c);
    }
    .kpi small{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600}
    .kpi b{display:block;font-size:26px;font-weight:700;margin-top:6px;color:var(--c)}

    /* TOOLBAR */
    .bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
    .bar input,.bar select{
      background:var(--card);border:1px solid var(--border);color:var(--text);
      padding:7px 12px;border-radius:8px;font-size:13px;outline:none;font-family:inherit;
    }
    .bar input:focus,.bar select:focus{border-color:var(--rosa)}
    .bar input::placeholder{color:var(--muted)}
    .bar select option{background:var(--card2)}
    .btn{
      padding:7px 14px;background:var(--rosa);color:#fff;border:none;
      border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
    }
    .btn:hover{background:var(--rosa2)}
    .btn.sec{background:var(--card2);border:1px solid var(--border);color:var(--muted)}
    .btn.sec:hover{color:var(--text);border-color:var(--rosa)}
    #count{font-size:12px;color:var(--muted);margin-left:auto}

    /* TABELA */
    .tbox{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:900px}
    thead{background:var(--card2)}
    th{padding:11px 14px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600;white-space:nowrap}
    tbody tr{border-top:1px solid var(--border);transition:background .12s}
    tbody tr:hover{background:rgba(232,82,138,.05)}
    td{padding:12px 14px;font-size:13px;vertical-align:middle}

    .tid{font-weight:700;color:var(--muted);font-size:12px}
    .tnome{font-weight:600}
    .tobs{font-size:11px;color:var(--muted);margin-top:3px}
    .titens{font-size:11px;color:var(--muted);line-height:1.8;max-width:200px}
    .ttotal{font-weight:700;color:var(--rosa);white-space:nowrap}
    .tdata{font-size:11px;color:var(--muted);white-space:nowrap}

    .badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:none;cursor:pointer;font-family:inherit;outline:none;appearance:none}
    .badge.pendente  {background:rgba(245,158,11,.15);color:#fbbf24}
    .badge.confirmado{background:rgba(34,197,94,.15) ;color:#4ade80}
    .badge.entregue  {background:rgba(59,130,246,.15) ;color:#60a5fa}
    .badge.cancelado {background:rgba(239,68,68,.15)  ;color:#f87171}

    .pag{font-size:11px;background:var(--card2);border:1px solid var(--border);padding:2px 8px;border-radius:5px;color:var(--muted)}
    .wa{color:var(--green);text-decoration:none;font-size:12px}
    .wa:hover{text-decoration:underline}
    .del{background:none;border:1px solid rgba(239,68,68,.25);color:rgba(239,68,68,.6);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer}
    .del:hover{background:rgba(239,68,68,.15);color:var(--red);border-color:var(--red)}

    /* VAZIO / LOADING */
    .center{text-align:center;padding:60px 20px;color:var(--muted)}
    .spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--rosa);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    #toast{
      position:fixed;bottom:20px;right:20px;z-index:999;max-width:300px;
      background:var(--card2);border:1px solid var(--green);color:var(--text);
      padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;
      box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);
      transition:all .25s;pointer-events:none;
    }
    #toast.on{opacity:1;transform:translateY(0)}

    @media(max-width:600px){.page{padding:12px}.kpis{grid-template-columns:1fr 1fr}nav{padding:0 14px}}
  </style>
</head>
<body>

<nav>
  <div class="brand">🍰 Gelamour · Admin</div>
  <div id="sync"><div id="sync-dot"></div><span id="sync-txt">Sincronizando...</span></div>
</nav>

<div class="page">

  <div id="aviso"></div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi" style="--c:var(--rosa)">   <small>Total</small>      <b id="kTot">—</b></div>
    <div class="kpi" style="--c:var(--yellow)"> <small>Pendentes</small>  <b id="kPen">—</b></div>
    <div class="kpi" style="--c:var(--green)">  <small>Entregues</small>  <b id="kEnt">—</b></div>
    <div class="kpi" style="--c:var(--blue)">   <small>Confirmados</small><b id="kCon">—</b></div>
    <div class="kpi" style="--c:var(--purple)"> <small>Faturamento</small><b id="kFat">—</b></div>
  </div>

  <!-- TOOLBAR -->
  <div class="bar">
    <select id="fSt" onchange="renderFiltrado()">
      <option value="">Todos os status</option>
      <option value="pendente">⏳ Pendente</option>
      <option value="confirmado">✅ Confirmado</option>
      <option value="entregue">🚀 Entregue</option>
      <option value="cancelado">❌ Cancelado</option>
    </select>
    <input id="fNome" type="text" placeholder="Buscar nome..." oninput="renderFiltrado()" style="min-width:180px">
    <input id="fData" type="date" onchange="renderFiltrado()">
    <button class="btn" onclick="buscar()">↻ Atualizar</button>
    <button class="btn sec" onclick="csv()">⬇ CSV</button>
    <span id="count"></span>
  </div>

  <!-- TABELA -->
  <div class="tbox">
    <div id="loading" class="center"><div class="spin"></div><p>Buscando pedidos...</p></div>
    <div id="vazio"   class="center" style="display:none"><p style="font-size:36px;margin-bottom:10px">📭</p><p>Nenhum pedido encontrado</p></div>
    <table id="tab"   style="display:none">
      <thead><tr>
        <th>#</th><th>Cliente</th><th>WhatsApp</th><th>Endereço</th>
        <th>Itens</th><th>Total</th><th>Pag.</th><th>Status</th><th>Data</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div><!-- .page -->

<div id="toast"></div>

<script>
/* ── CONFIG ─────────────────────────────────────── */
var API  = 'https://rfbtdtvsnftybazfmdbw.supabase.co/rest/v1';
var KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmYnRkdHZzbmZ0eWJhemZtZGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTAzNjAsImV4cCI6MjA5NzQ4NjM2MH0.Hw68jQFFmwLgvwF9zjhgVWPc3D1Q2pfgAn1TQlJEVu4';
var H    = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
var POLL = 5000; // 5 segundos

/* ── STATE ───────────────────────────────────────── */
var todos = [];
var ultimo = 0; // id do último pedido visto

/* ── API ─────────────────────────────────────────── */
async function req(method, path, body) {
  var r = await fetch(API + path, {method:method, headers:H, body:body?JSON.stringify(body):undefined});
  if (!r.ok) { var t=await r.text(); throw new Error(r.status+': '+t); }
  if (r.status===204) return null;
  return r.json().catch(function(){return null});
}

/* ── BUSCAR TODOS OS PEDIDOS ─────────────────────── */
async function buscar() {
  try {
    var data = await req('GET', '/pedidos?select=*&order=criado_em.desc');
    todos = Array.isArray(data) ? data : [];

    // detectar novo pedido
    if (todos.length > 0) {
      var maxId = Math.max.apply(null, todos.map(function(p){return p.id}));
      if (ultimo > 0 && maxId > ultimo) {
        var novo = todos.find(function(p){return p.id===maxId});
        toast('🛒 Novo pedido de '+(novo?novo.nome:'alguém')+'!');
        notif('Novo pedido de '+(novo?novo.nome:'alguém'));
      }
      ultimo = maxId;
    }

    kpis();
    renderFiltrado();
    sync('🟢 Atualizado · '+new Date().toLocaleTimeString('pt-BR'));
    aviso('');
  } catch(e) {
    aviso('Erro ao buscar pedidos: '+e.message);
    sync('🔴 Erro de conexão');
  }
}

/* ── KPIs ────────────────────────────────────────── */
function kpis() {
  document.getElementById('kTot').textContent = todos.length;
  document.getElementById('kPen').textContent = todos.filter(function(p){return p.status==='pendente'}).length;
  document.getElementById('kEnt').textContent = todos.filter(function(p){return p.status==='entregue'}).length;
  document.getElementById('kCon').textContent = todos.filter(function(p){return p.status==='confirmado'}).length;
  var fat = todos.reduce(function(s,p){return s+parseFloat(p.total||0)},0);
  document.getElementById('kFat').textContent = 'R$ '+fat.toFixed(2).replace('.',',');
}

/* ── FILTRAR E RENDERIZAR ────────────────────────── */
function renderFiltrado() {
  var st   = document.getElementById('fSt').value;
  var nome = document.getElementById('fNome').value.toLowerCase();
  var data = document.getElementById('fData').value;

  var lista = todos.filter(function(p){
    return (!st   || p.status===st)
        && (!nome || (p.nome||'').toLowerCase().indexOf(nome)!==-1)
        && (!data || (p.criado_em||'').indexOf(data)!==-1);
  });

  document.getElementById('count').textContent = lista.length+' pedido'+(lista.length!==1?'s':'');
  render(lista);
}

/* ── RENDER TABELA ───────────────────────────────── */
function render(lista) {
  document.getElementById('loading').style.display = 'none';

  if (!lista.length) {
    document.getElementById('tab').style.display   = 'none';
    document.getElementById('vazio').style.display = 'block';
    return;
  }
  document.getElementById('vazio').style.display = 'none';
  document.getElementById('tab').style.display   = 'table';

  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  lista.forEach(function(p){
    var itens  = Array.isArray(p.itens) ? p.itens : [];
    var iHtml  = itens.map(function(i){
      return '· '+esc(i.nome)+' <span style="color:var(--rosa)">R$'
             +parseFloat(i.preco||0).toFixed(2).replace('.',',')+'</span>';
    }).join('<br>');

    var dt = new Date(p.criado_em).toLocaleString('pt-BR',
      {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});

    var tel    = p.telefone||'';
    var telFmt = tel ? tel.replace(/^(\d{2})(\d{4,5})(\d{4})$/,'($1) $2-$3') : '';
    var wa     = telFmt
      ? '<a href="https://wa.me/55'+tel+'" target="_blank" class="wa">📱 '+telFmt+'</a>'
      : '<span style="color:var(--muted)">—</span>';

    var sel =
      '<select class="badge '+p.status+'" onchange="mudar('+p.id+',this)">'
      +'<option value="pendente"'  +(p.status==='pendente'  ?' selected':'')+'>⏳ Pendente</option>'
      +'<option value="confirmado"'+(p.status==='confirmado'?' selected':'')+'>✅ Confirmado</option>'
      +'<option value="entregue"'  +(p.status==='entregue'  ?' selected':'')+'>🚀 Entregue</option>'
      +'<option value="cancelado"' +(p.status==='cancelado' ?' selected':'')+'>❌ Cancelado</option>'
      +'</select>';

    var tr = document.createElement('tr');
    tr.id = 'r'+p.id;
    tr.innerHTML =
      '<td class="tid">#'+p.id+'</td>'
      +'<td class="tnome">'+esc(p.nome||'—')
        +(p.observacao?'<div class="tobs">📝 '+esc(p.observacao)+'</div>':'')+
      '</td>'
      +'<td>'+wa+'</td>'
      +'<td style="font-size:11px;color:var(--muted);max-width:150px">'+esc(p.endereco||'—')+'</td>'
      +'<td class="titens">'+(iHtml||'—')+'</td>'
      +'<td class="ttotal">R$ '+parseFloat(p.total||0).toFixed(2).replace('.',',')+'</td>'
      +'<td><span class="pag">'+esc(p.pagamento||'—')+'</span></td>'
      +'<td>'+sel+'</td>'
      +'<td class="tdata">'+dt+'</td>'
      +'<td><button class="del" onclick="del('+p.id+')">🗑</button></td>';
    tbody.appendChild(tr);
  });
}

/* ── AÇÕES ───────────────────────────────────────── */
async function mudar(id, sel) {
  var novo = sel.value;
  sel.className = 'badge '+novo;
  try {
    await req('PATCH', '/pedidos?id=eq.'+id, {status:novo});
    var i = todos.findIndex(function(p){return p.id===id});
    if (i!==-1) todos[i].status = novo;
    kpis();
    toast('Status atualizado para '+novo);
  } catch(e){ aviso('Erro ao atualizar: '+e.message); }
}

async function del(id) {
  if (!confirm('Remover pedido #'+id+'?')) return;
  try {
    await req('DELETE', '/pedidos?id=eq.'+id);
    todos = todos.filter(function(p){return p.id!==id});
    kpis(); renderFiltrado();
    toast('Pedido #'+id+' removido');
  } catch(e){ aviso('Erro ao remover: '+e.message); }
}

/* ── CSV ─────────────────────────────────────────── */
function csv() {
  var st   = document.getElementById('fSt').value;
  var nome = document.getElementById('fNome').value.toLowerCase();
  var data = document.getElementById('fData').value;
  var lista = todos.filter(function(p){
    return (!st||p.status===st)&&(!nome||(p.nome||'').toLowerCase().indexOf(nome)!==-1)&&(!data||(p.criado_em||'').indexOf(data)!==-1);
  });
  var rows = [['#','Nome','Telefone','Endereço','Total','Pagamento','Status','Data']];
  lista.forEach(function(p){
    rows.push([p.id,p.nome||'',p.telefone||'',p.endereco||'',
      parseFloat(p.total||0).toFixed(2),p.pagamento||'',p.status,
      new Date(p.criado_em).toLocaleString('pt-BR')]);
  });
  var txt = rows.map(function(r){
    return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');
  }).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿'+encodeURIComponent(txt);
  a.download = 'gelamour-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exportado ('+lista.length+' pedidos)');
}

/* ── UI HELPERS ──────────────────────────────────── */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sync(txt){ document.getElementById('sync-txt').textContent = txt; }

function aviso(msg){
  var el = document.getElementById('aviso');
  el.textContent = msg ? '⚠️ '+msg : '';
  el.style.display = msg ? 'block' : 'none';
}

var _toastT;
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_toastT);
  _toastT = setTimeout(function(){ el.classList.remove('on'); }, 3500);
}

function notif(msg){
  if (Notification.permission==='granted') new Notification('Gelamour 🍰',{body:msg});
  else if (Notification.permission!=='denied') Notification.requestPermission();
}

/* ── BOOT ────────────────────────────────────────── */
buscar();                        // carrega imediatamente
setInterval(buscar, POLL);       // polling a cada 5 segundos
</script>
</body>
</html>
