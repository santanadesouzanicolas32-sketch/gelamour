<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gelamour — Painel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa:#E8528A; --rosa-dark:#C23A6E; --dourado:#D4AF37;
      --marrom:#4A2C17; --texto:#2C1810; --sec:#6B5B52;
      --borda:#E8E0D8; --verde:#22c55e; --amarelo:#f59e0b;
      --azul:#3b82f6; --vermelho:#ef4444; --bg:#f5f5f5;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh}

    /* HEADER */
    header{background:linear-gradient(135deg,var(--marrom),var(--rosa-dark));padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    header h1{color:var(--dourado);font-size:18px;font-weight:700}
    #dot{font-size:12px;color:rgba(255,255,255,.7)}

    /* ERRO */
    #erro{background:#fee2e2;color:#991b1b;padding:12px 28px;font-size:13px;display:none}

    /* CARDS */
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;padding:20px 28px 0}
    .card{background:#fff;border-radius:12px;padding:18px;border-left:4px solid var(--rosa);box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .card.am{border-color:var(--amarelo)}.card.vd{border-color:var(--verde)}.card.az{border-color:var(--azul)}.card.vm{border-color:var(--vermelho)}
    .card small{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--sec)}
    .card strong{display:block;font-size:24px;font-weight:700;margin-top:4px}

    /* FILTROS */
    .filtros{display:flex;gap:10px;padding:18px 28px 14px;flex-wrap:wrap;align-items:center}
    .filtros select,.filtros input{padding:8px 12px;border:1px solid var(--borda);border-radius:8px;font-size:13px;background:#fff;color:var(--texto);outline:none;font-family:inherit}
    .filtros select:focus,.filtros input:focus{border-color:var(--rosa)}
    .btn{padding:8px 16px;background:var(--rosa);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn:hover{background:var(--rosa-dark)}

    /* TABELA */
    .wrap{padding:0 28px 40px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    thead{background:var(--marrom)}
    th{color:#fff;padding:12px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
    tbody tr{border-bottom:1px solid var(--borda)}
    tbody tr:hover{background:#fdf5f9}
    tbody tr:last-child{border-bottom:none}
    td{padding:12px 14px;font-size:13px;vertical-align:top}
    .tnome{font-weight:600;max-width:130px}
    .titens{font-size:11px;color:var(--sec);line-height:1.6;max-width:190px}
    .ttotal{font-weight:700;color:var(--rosa-dark);white-space:nowrap}
    .tdata{font-size:11px;color:var(--sec);white-space:nowrap}

    .badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;border:none;cursor:pointer;outline:none;font-family:inherit}
    .badge.pendente{background:#fef3c7;color:#92400e}
    .badge.confirmado{background:#d1fae5;color:#065f46}
    .badge.entregue{background:#dbeafe;color:#1e40af}
    .badge.cancelado{background:#fee2e2;color:#991b1b}

    .pag{font-size:11px;background:#f3f4f6;padding:3px 7px;border-radius:5px}
    .del{background:none;border:1px solid #fca5a5;color:var(--vermelho);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
    .del:hover{background:#fee2e2}

    #vazio{text-align:center;padding:60px;color:var(--sec)}
    #loading{text-align:center;padding:60px;color:var(--sec);font-size:15px}

    @media(max-width:640px){.cards,.filtros,.wrap{padding-left:14px;padding-right:14px}header{padding:14px}}
  </style>
</head>
<body>

<header>
  <h1>🍰 Gelamour — Painel de Pedidos</h1>
  <span id="dot">Carregando...</span>
</header>

<div id="erro"></div>

<div class="cards">
  <div class="card"><small>Total</small><strong id="cTotal">—</strong></div>
  <div class="card am"><small>Pendentes</small><strong id="cPend">—</strong></div>
  <div class="card vd"><small>Entregues</small><strong id="cEntr">—</strong></div>
  <div class="card az"><small>Confirmados</small><strong id="cConf">—</strong></div>
  <div class="card vm"><small>Faturamento</small><strong id="cFat">—</strong></div>
</div>

<div class="filtros">
  <select id="fStatus" onchange="filtrar()">
    <option value="">Todos os status</option>
    <option value="pendente">⏳ Pendente</option>
    <option value="confirmado">✅ Confirmado</option>
    <option value="entregue">🚀 Entregue</option>
    <option value="cancelado">❌ Cancelado</option>
  </select>
  <input id="fBusca" type="text" placeholder="Buscar por nome..." oninput="filtrar()">
  <button class="btn" onclick="carregar()">↻ Atualizar</button>
</div>

<div class="wrap">
  <div id="loading">Carregando pedidos...</div>
  <table id="tabela" style="display:none">
    <thead><tr>
      <th>#</th><th>Cliente</th><th>WhatsApp</th><th>Endereço</th>
      <th>Itens</th><th>Total</th><th>Pag.</th><th>Status</th><th>Data</th><th></th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="vazio" style="display:none">
    <div style="font-size:44px;margin-bottom:10px">📭</div>
    Nenhum pedido encontrado
  </div>
</div>

<script>
var URL_BASE = 'https://rfbtdtvsnftybazfmdbw.supabase.co/rest/v1';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmYnRkdHZzbmZ0eWJhemZtZGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTAzNjAsImV4cCI6MjA5NzQ4NjM2MH0.Hw68jQFFmwLgvwF9zjhgVWPc3D1Q2pfgAn1TQlJEVu4';
var HDR = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

var todos = [];

function dot(txt) { document.getElementById('dot').textContent = txt; }
function erro(msg) {
  var el = document.getElementById('erro');
  el.textContent = msg ? '⚠️ ' + msg : '';
  el.style.display = msg ? 'block' : 'none';
}

async function api(method, path, body) {
  var opts = { method: method, headers: HDR };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(URL_BASE + path, opts);
  if (!r.ok) {
    var txt = await r.text();
    throw new Error(r.status + ' ' + txt);
  }
  var ct = r.headers.get('content-type') || '';
  if (ct.indexOf('json') !== -1 && r.status !== 204) return r.json();
  return null;
}

async function carregar() {
  dot('Carregando...');
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tabela').style.display  = 'none';
  document.getElementById('vazio').style.display   = 'none';
  erro('');
  try {
    var data = await api('GET', '/pedidos?select=*&order=criado_em.desc');
    todos = data || [];
    resumo();
    filtrar();
    dot('🟢 ' + new Date().toLocaleTimeString('pt-BR'));
  } catch(e) {
    erro('Erro ao carregar pedidos: ' + e.message);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('vazio').style.display   = 'block';
    dot('🔴 Erro');
  }
}

function resumo() {
  document.getElementById('cTotal').textContent = todos.length;
  document.getElementById('cPend').textContent  = todos.filter(function(p){return p.status==='pendente'}).length;
  document.getElementById('cEntr').textContent  = todos.filter(function(p){return p.status==='entregue'}).length;
  document.getElementById('cConf').textContent  = todos.filter(function(p){return p.status==='confirmado'}).length;
  var fat = todos.reduce(function(s,p){return s + parseFloat(p.total||0)}, 0);
  document.getElementById('cFat').textContent = 'R$ ' + fat.toFixed(2).replace('.',',');
}

function filtrar() {
  var st = document.getElementById('fStatus').value;
  var bk = document.getElementById('fBusca').value.toLowerCase();
  var lista = todos.filter(function(p) {
    return (!st || p.status === st) && (!bk || (p.nome||'').toLowerCase().indexOf(bk) !== -1);
  });
  render(lista);
}

function render(lista) {
  document.getElementById('loading').style.display = 'none';
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (lista.length === 0) {
    document.getElementById('tabela').style.display = 'none';
    document.getElementById('vazio').style.display  = 'block';
    return;
  }

  document.getElementById('tabela').style.display = 'table';
  document.getElementById('vazio').style.display  = 'none';

  lista.forEach(function(p) {
    var itens = Array.isArray(p.itens) ? p.itens : [];
    var itensHTML = itens.map(function(i) {
      return '• ' + i.nome + ' — R$ ' + parseFloat(i.preco).toFixed(2).replace('.',',');
    }).join('<br>');

    var dt = new Date(p.criado_em).toLocaleString('pt-BR',
      {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

    var tel = p.telefone || '';
    var telFmt = tel ? tel.replace(/^(\d{2})(\d{4,5})(\d{4})$/,'($1) $2-$3') : '';
    var wa = telFmt
      ? '<a href="https://wa.me/55' + tel + '" target="_blank" style="color:var(--verde);text-decoration:none;font-size:12px">📱 ' + telFmt + '</a>'
      : '<span style="color:var(--sec)">—</span>';

    var sel =
      '<select class="badge ' + p.status + '" onchange="mudarStatus(' + p.id + ',this)">' +
      '<option value="pendente"'   + (p.status==='pendente'   ?' selected':'') + '>⏳ Pendente</option>' +
      '<option value="confirmado"' + (p.status==='confirmado' ?' selected':'') + '>✅ Confirmado</option>' +
      '<option value="entregue"'   + (p.status==='entregue'   ?' selected':'') + '>🚀 Entregue</option>' +
      '<option value="cancelado"'  + (p.status==='cancelado'  ?' selected':'') + '>❌ Cancelado</option>' +
      '</select>';

    var obs = p.observacao ? '<br><small style="color:var(--sec);font-weight:400">📝 ' + p.observacao + '</small>' : '';

    var tr = document.createElement('tr');
    tr.id = 'r' + p.id;
    tr.innerHTML =
      '<td><strong>#' + p.id + '</strong></td>' +
      '<td class="tnome">' + (p.nome||'—') + obs + '</td>' +
      '<td>' + wa + '</td>' +
      '<td style="font-size:11px;max-width:150px">' + (p.endereco||'—') + '</td>' +
      '<td class="titens">' + (itensHTML||'—') + '</td>' +
      '<td class="ttotal">R$ ' + parseFloat(p.total||0).toFixed(2).replace('.',',') + '</td>' +
      '<td><span class="pag">' + (p.pagamento||'—') + '</span></td>' +
      '<td>' + sel + '</td>' +
      '<td class="tdata">' + dt + '</td>' +
      '<td><button class="del" onclick="deletar(' + p.id + ')">🗑</button></td>';
    tbody.appendChild(tr);
  });
}

async function mudarStatus(id, sel) {
  var novo = sel.value;
  sel.className = 'badge ' + novo;
  try {
    await api('PATCH', '/pedidos?id=eq.' + id, { status: novo });
    var i = todos.findIndex(function(p){return p.id===id});
    if (i !== -1) todos[i].status = novo;
    resumo();
  } catch(e) {
    erro('Erro ao atualizar status: ' + e.message);
  }
}

async function deletar(id) {
  if (!confirm('Remover pedido #' + id + '?')) return;
  try {
    await api('DELETE', '/pedidos?id=eq.' + id);
    todos = todos.filter(function(p){return p.id !== id});
    resumo(); filtrar();
  } catch(e) {
    erro('Erro ao remover: ' + e.message);
  }
}

// Realtime via SSE (Supabase Realtime WebSocket nativo)
function conectarRealtime() {
  try {
    var ws = new WebSocket(
      'wss://rfbtdtvsnftybazfmdbw.supabase.co/realtime/v1/websocket?apikey=' + KEY + '&vsn=1.0.0'
    );
    ws.onopen = function() {
      ws.send(JSON.stringify({topic:'realtime:public:pedidos',event:'phx_join',payload:{},ref:'1'}));
      dot('🟢 Tempo real ativo');
    };
    ws.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        var ev = msg.payload && msg.payload.data && msg.payload.data.type;
        if (ev === 'INSERT' || ev === 'UPDATE' || ev === 'DELETE') {
          carregar();
        }
      } catch(_) {}
    };
    ws.onclose = function() {
      dot('🟡 Reconectando...');
      setTimeout(conectarRealtime, 5000);
    };
    ws.onerror = function() { dot('🟡 Sem tempo real'); };
  } catch(_) { dot('🟡 Sem tempo real'); }
}

// Iniciar
carregar();
conectarRealtime();
setInterval(carregar, 30000);
</script>
</body>
</html>
